<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="tab">
        <button class="tablinks" onclick="openTab(event, 'camfeed_main')">MainCamera</button>
        <button class="tablinks" onclick="openTab(event, 'controller')">Controller</button>
    </div>

    <div id="camfeed_main" class="tabcontent">
        <h3>Main Camera Stream</h3>
        <img id="camera-stream" src="/video_feed" alt="No Camera Stream :(">
        <p id="camera-status">Camera not connected</p>
    </div>

    <div id="controller" class="tabcontent">
        <h3>Controller Input Monitor</h3>
        <div id="start">Waiting for controller...</div>
        <div id="controller-display"></div>
    </div>

    <script type="text/javascript" src="/static/interaction.js"></script>
    <script type="text/javascript" src="/static/gamepad.js" defer></script>
    <script>
        window.addEventListener("DOMContentLoaded", function () {
            const firstTabButton = document.querySelector(".tab .tablinks");
            if (firstTabButton) {
                firstTabButton.click();
            }
        });

        (function liveReload() {
            let currentRevision = null;
            let sawBackendDisconnect = false;
            const stream = document.getElementById("camera-stream");
            const cameraStatus = document.getElementById("camera-status");

            function showCameraDisconnected() {
                stream.style.display = "none";
                cameraStatus.style.display = "block";
            }

            function showCameraConnected() {
                stream.style.display = "inline-block";
                cameraStatus.style.display = "none";
            }

            function restartStream() {
                stream.src = "/video_feed?t=" + Date.now();
            }

            async function refreshCameraStatus() {
                try {
                    const response = await fetch("/camera_status", { cache: "no-store" });
                    if (!response.ok) {
                        showCameraDisconnected();
                        return;
                    }

                    const payload = await response.json();
                    if (payload.connected) {
                        showCameraConnected();
                        if (!stream.complete || stream.naturalWidth === 0) {
                            restartStream();
                        }
                    } else {
                        showCameraDisconnected();
                    }
                } catch (error) {
                    showCameraDisconnected();
                }
            }

            stream.addEventListener("error", showCameraDisconnected);

            async function checkRevision() {
                try {
                    const response = await fetch("/__source_revision", {
                        cache: "no-store",
                    });

                    if (!response.ok) {
                        return;
                    }

                    const payload = await response.json();
                    const nextRevision = String(payload.revision);

                    if (sawBackendDisconnect) {
                        window.location.reload();
                        return;
                    }

                    if (currentRevision === null) {
                        currentRevision = nextRevision;
                        return;
                    }

                    if (nextRevision !== currentRevision) {
                        window.location.reload();
                    }
                } catch (error) {
                    sawBackendDisconnect = true;
                }
            }

            setInterval(checkRevision, 1000);
            checkRevision();
            setInterval(refreshCameraStatus, 2000);
            refreshCameraStatus();
        })();
    </script>
</body>
</html>
